<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Реєстрація - Автобаза</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f0f0f0; margin: 0; }
        .login-box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; width: 300px; }
        .error { color: red; margin-bottom: 15px; font-size: 0.9em; }
        .success { color: green; margin-bottom: 15px; font-size: 0.9em; }
        input, select { display: block; margin-bottom: 15px; padding: 10px; width: 100%; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { padding: 10px; width: 100%; cursor: pointer; background-color: #2ecc71; color: white; border: none; border-radius: 4px; font-weight: bold; }
        button:hover { background-color: #27ae60; }
        a { display: block; margin-top: 15px; color: #3498db; text-decoration: none; font-size: 0.9em; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>Реєстрація</h2>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <form action="/register" method="POST">
            <input type="text" name="login" placeholder="Придумайте логін" required>
            <input type="password" name="password" placeholder="Придумайте пароль" required>

            <select name="role" required>
                <option value="dispatcher">Я Диспетчер</option>
                <option value="driver">Я Водій</option>
            </select>

            <button type="submit">Зареєструватися</button>
        </form>

        <a href="/login">Вже є акаунт? Увійти</a>
    </div>

</body>
</html>
