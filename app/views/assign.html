{% extends "base.html" %}

{% block title %}Призначення рейсу - Автобаза{% endblock %}

{% block content %}
    <h2>Призначення авто на заявку #{{ request.id }}</h2>

    <div style="background: #f8f9fa; padding: 15px; border-radius: 5px; margin-bottom: 20px;">
        <strong>Маршрут:</strong> {{ request.destination }} <br>
        <strong>Вимоги:</strong> {{ request.required_value }} {{ request.required_type }}
    </div>

   <form action="/assign" method="POST">
    <input type="hidden" name="request_id" value="{{ request.id }}">

    <label><strong>Оберіть автомобіль:</strong></label><br>
    <select name="car_id" required style="width: 100%; padding: 8px; margin-top: 5px; margin-bottom: 15px;">
        <option value="" disabled selected>-- Виберіть авто --</option>
        {% for car in valid_cars %}
            <option value="{{ car.id }}">{{ car.model }} (Водій: {{ car.driver_name }})</option>
        {% else %}
            <option value="" disabled>Немає підходящих справних авто з водіями</option>
        {% endfor %}
    </select>

    <button type="submit" class="btn" style="width: 100%; background: #2ecc71;">Підтвердити рейс</button>
    <a href="/" style="display: block; text-align: center; margin-top: 10px; color: #7f8c8d; text-decoration: none;">Скасувати</a>
</form>
{% endblock %}
