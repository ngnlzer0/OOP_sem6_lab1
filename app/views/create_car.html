{% extends "base.html" %}

{% block title %}Додати авто - Автобаза{% endblock %}

{% block content %}
    <h2>Додати новий автомобіль</h2>

    <form action="/create_car" method="POST" style="max-width: 400px; background: #f8f9fa; padding: 20px; border-radius: 8px;">

        <div style="margin-bottom: 15px;">
            <label><strong>Модель авто:</strong></label><br>
            <input type="text" name="model" placeholder="Напр. Mercedes Sprinter" required style="width: 100%; padding: 8px; margin-top: 5px;">
        </div>

        <div style="margin-bottom: 15px;">
            <label><strong>Тип автомобіля:</strong></label><br>
            <select name="type" required style="width: 100%; padding: 8px; margin-top: 5px;">
                <option value="passenger">Пасажирський (місця)</option>
                <option value="cargo">Вантажний (тоннаж/об'єм)</option>
            </select>
        </div>

        <div style="margin-bottom: 15px;">
            <label><strong>Місткість (місця) АБО Вантажопідйомність:</strong></label><br>
            <input type="number" step="0.1" name="capacity" required style="width: 100%; padding: 8px; margin-top: 5px;">
        </div>

        <div style="margin-bottom: 15px;">
            <label><strong>Рівень пального (%):</strong></label><br>
            <input type="number" name="fuel_level" value="100" min="0" max="100" required style="width: 100%; padding: 8px; margin-top: 5px;">
        </div>

        <button type="submit" class="btn" style="width: 100%; background: #2ecc71;">Додати в автопарк</button>
    </form>
{% endblock %}
